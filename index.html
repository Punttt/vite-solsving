<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solsving</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicons/favicon32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/images/favicons/favicon16.png">
    <link rel="stylesheet" href="/src/scss/main.scss">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
  <body>
    <header>
      <div class="container">
        <a href="/">
          <h1><img src="/images/logotypes/logotype.png" class="logo" alt="Solsving"></h1>
        </a>
      </div>
    </header>
    <main>
      <div class="container">
        <div class="intro">
          <div class="card">
            <p class="intro-text">
              Sök efter en stad för att se väder och äventyrsgolf nära dig.
            </p>
          </div>
        </div>

        <form id="locationForm" class="search-form">
          <input type="text" id="locationInput" placeholder="Vart vill du spela?" required>
          <button type="submit" class="btn">Sök</button>
        </form>

        <div class="spinner hidden" id="loader"></div>

        <!-- Rendering av väderprognosen -->
        <section class="card--weather" id="forecast"></section>

        <!-- Rendering av klubbar-->
        <section class="courses-wrapper" id="course-box"></section>
      </div>
    </main>
    <footer>
      <div class="container">
        <div class="icons">
          <a href="https://github.com/Punttt/vite-solsving.git" target="_blank" title="GitHub repository">
            <i class="fa-brands fa-square-github"></i>
          </a>
          <a href="https://punttt.github.io/vite-solsving/" target="_blank" title="JSdocs - Dokumentation">
            <i class="fa-brands fa-square-js"></i>
          </a>
          <a href="https://puntfolio.netlify.app/" target="_blank" title="Pontus Johansson - Portfolio">
            <i class="fa-solid fa-user"></i>
          </a>
        </div>
        <p>&copy; Pojodev - Pontus Johansson</p>
      </div>
    </footer>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
