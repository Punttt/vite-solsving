<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solsving</title>
    <link rel="stylesheet" href="/src/scss/main.scss">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  </head>
  <body>
    <header>
      <div class="container">
        <img src="/images/logotypes/logotype.png" class="logo" alt="Solsving">
      </div>
    </header>
    <main>
      <div class="container">
        <form id="locationForm" class="search-form">
          <input type="text" id="locationInput" placeholder="Vart vill du spela?" required>
          <button type="submit" class="btn">Sök</button>
        </form>

        <!-- Rendering av väderprognosen -->
        <div class="card card--weather hidden" id="forecast"></div>

        <section class="courses">
          <h2>Golfbanor i närheten:</h2>

          <div class="courses-wrapper">
            <div class="card course">
              <div class="course_info">
                <h3>Sundsvalls BGK - Äventyrsgolf</h3>
                <p>Sundsvalls BGK - Äventyrsgolf, Västra vägen 50, 857 40 Sundsvall, Sweden</p>
              </div>
              <a href="/" class="btn">Hitta hit</a>
            </div>
          </div>
        </section>
      </div>
    </main>
    <footer>
      <div class="container">
        <p>&copy; Pojodev</p>
      </div>
    </footer>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
